name: "E2E"

permissions:
  contents: read

on:
  workflow_call:
    inputs:
      package:
        description: The identifier of the job to run
        default: webapp
        required: false
        type: string

jobs:
  cli-v3:
    name: "🧪 CLI v3 tests (${{ matrix.os }} - ${{ matrix.package-manager }})"
    if: inputs.package == 'cli-v3' || inputs.package == ''
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        package-manager: ["npm", "pnpm"]
    steps:
      - name: ⬇️ Checkout repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: ⎔ Setup pnpm
        uses: pnpm/action-setup@903f9c1a6ebcba6cf41d87230be49611ac97822e # v6.0.3
        with:
          version: 10.23.0

      - name: ⎔ Setup node
        uses: buildjet/setup-node@6131e76b005f1e3f5c721e0ca2d8279eb577c3a8 # v4.0.4
        with:
          node-version: 20.20.0

      - name: 📥 Download deps
        run: pnpm install --frozen-lockfile --filter trigger.dev...

      - name: 📀 Generate Prisma Client
        run: pnpm run generate

      - name: 🔧 Build v3 cli monorepo dependencies
        run: pnpm run build --filter trigger.dev^...

      - name: 🔧 Build worker template files
        run: pnpm --filter trigger.dev run build:workers

      - name: Enable corepack
        run: corepack enable

      - name: Run E2E Tests
        shell: bash
        run: |
          LOG=debug PM=${{ matrix.package-manager }} pnpm --filter trigger.dev run test:e2e
